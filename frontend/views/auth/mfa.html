<!--
ARQUIVO: mfa.html

FUNÇÃO:
Página de interface do usuário utilizada no frontend do sistema JamesBar.

SEGURANÇA APLICADA:
- Segunda etapa de autenticação para administradores.
-->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MFA | JamesBar</title>

    <link rel="stylesheet" href="../../assets/css/global.css">
    <link rel="stylesheet" href="../../assets/css/auth/mfa.css">
    <script src="../../assets/js/auth_check.js"></script>
</head>

<body>

    <div class="background"></div>
    <div class="overlay"></div>

    <main class="mfa-container">

        <section class="mfa-card">

            <h1>Verificação MFA</h1>

            <p id="mfaDescricao">
                Digite o código do Google Authenticator.
            </p>

            <div id="setupMfaArea" class="setup-area escondido">

                <p>
                    Escaneie o QR Code abaixo no Google Authenticator.
                </p>

                <img
                    id="qrCodeMfa"
                    src=""
                    alt="QR Code MFA"
                    class="qr-code">

                <p class="secret-text">
                    Chave manual:
                    <span id="secretMfa"></span>
                </p>

            </div>

            <form id="mfaForm">

                <div class="input-group">
                    <label for="codigoMfa">Código MFA</label>

                    <input
                        type="text"
                        id="codigoMfa"
                        maxlength="6"
                        placeholder="Digite os 6 dígitos"
                        required>
                </div>

                <button type="submit">
                    Confirmar MFA
                </button>

            </form>

        </section>

    </main>

    <script src="../../assets/js/auth/mfa.js"></script>

</body>
</html>
